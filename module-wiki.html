<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家庭數位管家 — 小百科</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FDF6F7;
      --white: #FFFFFF;
      --pink-light: #F4C5C9;
      --pink-mid: #EFA5A8;
      --pink-main: #C36D78;
      --pink-dark: #8C3A44;
      --text: #2D1B1E;
      --text-mid: #5C3D42;
      --text-light: #9B6B72;
      --border: #F4C5C9;
      --card: #FFFFFF;
      --danger: #C62828;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; -webkit-font-smoothing: antialiased; }
    .phone-container { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .status-bar { height: 28px; background: rgba(253, 246, 247, 0.95); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; font-size: 11px; border-bottom: 1px solid var(--border); }
    .sb-time { font-size: 12px; font-weight: 700; }
    .app-header { background: rgba(253, 246, 247, 0.95); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 99; }
    .ah-title { font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 600; }
    .hbtn { font-size: 12px; background: var(--pink-light); border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; color: var(--text-mid); font-weight: 500; cursor: pointer; }
    
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding-bottom: 60px; }
    .screen-body { flex: 1; overflow-y: auto; }

    .favorites-section { background: linear-gradient(135deg, #FFF5F7, #FFE8EC); border: 1.5px dashed var(--pink-light); border-radius: 14px; margin: 12px 16px; padding: 12px; }
    .fav-title { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; color: var(--pink-main); text-transform: uppercase; margin-bottom: 10px; }
    .fav-list { display: flex; flex-direction: column; gap: 6px; }
    .fav-item { background: var(--white); border: 1.5px solid var(--pink-light); border-radius: 8px; padding: 8px 12px; cursor: pointer; transition: all 0.2s; font-size: 13px; display: flex; align-items: center; justify-content: space-between; }
    .fav-item:hover { border-color: var(--pink-main); }

    .article-grid { display: grid; grid-template-columns: 1fr; gap: 8px; padding: 12px 16px; }
    .article-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: all 0.2s; }
    .article-card:hover { border-color: var(--pink-main); }
    .article-header { padding: 12px; display: flex; align-items: start; justify-content: space-between; gap: 8px; }
    .article-title { font-size: 14px; font-weight: 500; flex: 1; }
    .article-category { font-size: 11px; color: var(--text-light); margin-top: 4px; }
    .article-star { font-size: 16px; cursor: pointer; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1)); flex-shrink: 0; }

    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: rgba(253, 246, 247, 0.98); border-top: 1.5px solid var(--border); display: flex; justify-content: space-around; padding: 8px 0 4px; z-index: 101; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; opacity: 0.5; cursor: pointer; text-decoration: none; color: inherit; transition: all 0.2s; }
    .nav-item.active { opacity: 1; }
    .ni-icon { font-size: 20px; }
    .ni-label { font-size: 10px; color: var(--text-light); font-weight: 500; }
    .nav-item.active .ni-label { color: var(--pink-main); font-weight: 700; }

    .fab { position: fixed; bottom: 72px; right: 16px; width: 48px; height: 48px; border-radius: 50%; background: var(--pink-main); color: white; font-size: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 14px rgba(195, 109, 120, 0.3); cursor: pointer; z-index: 50; }

    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); z-index: 200; align-items: flex-end; }
    .modal.active { display: flex; }
    .modal-content { background: var(--card); width: 100%; border-radius: 20px 20px 0 0; padding: 24px 16px 32px; max-height: 85vh; overflow-y: auto; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .modal-title { font-family: 'Noto Serif TC', serif; font-size: 20px; font-weight: 600; }
    .modal-close { font-size: 20px; cursor: pointer; color: var(--text-light); }

    .detail-section { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .detail-section:last-child { border-bottom: none; }
    .detail-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--pink-main); text-transform: uppercase; margin-bottom: 6px; }
    .detail-value { font-size: 15px; color: var(--text); word-break: break-all; }

    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; color: var(--pink-main); text-transform: uppercase; margin-bottom: 6px; display: block; }
    .form-input, .form-select { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'Noto Sans TC', sans-serif; font-size: 14px; color: var(--text); }
    .form-input:focus, .form-select:focus { outline: none; border-color: var(--pink-main); box-shadow: 0 0 0 3px rgba(195, 109, 120, 0.1); }

    .modal-actions { display: flex; gap: 8px; margin-top: 24px; }
    .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; }
    .btn-primary { background: var(--pink-main); color: white; }
    .btn-secondary { background: var(--bg); border: 1.5px solid var(--border); color: var(--text-mid); }
    .btn-danger { background: rgba(198, 40, 40, 0.1); color: var(--danger); }

    .hidden { display: none; }
    .empty-state { text-align: center; padding: 40px 16px; color: var(--text-light); }
  </style>
  <script src="firebase-config.js"></script>
</head>
<body>
  <div class="phone-container">
    <div class="status-bar">
      <span class="sb-time" id="currentTime">09:18</span>
      <span>📶 🔋</span>
    </div>

    <div class="app-header">
      <div class="ah-title">小百科</div>
      <button class="hbtn" onclick="goHome()">🏡</button>
    </div>

    <div class="main-content">
      <div class="screen-body">
        <div id="favSection" class="favorites-section">
          <div class="fav-title">⭐ 常用書籤（<span id="favCount">0</span>）</div>
          <div class="fav-list" id="favList"></div>
        </div>

        <div style="padding: 0 16px;">
          <div style="font-size: 11px; font-weight: 700; letter-spacing: 0.2em; color: var(--text-light); text-transform: uppercase; padding: 12px 0 8px; margin-top: 8px;">全部書籤</div>
        </div>
        <div class="article-grid" id="articleGrid"></div>

        <div style="height: 20px;"></div>
      </div>
    </div>

    <div class="fab" onclick="openAddModal()">＋</div>

    <div class="bottom-nav">
      <a href="javascript:void(0)" class="nav-item" onclick="goHome()">
        <div class="ni-icon">🏡</div>
        <div class="ni-label">首頁</div>
      </a>
      <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('module-reminders.html')">
        <div class="ni-icon">📋</div>
        <div class="ni-label">提醒</div>
      </a>
      <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('module-inventory.html')">
        <div class="ni-icon">📦</div>
        <div class="ni-label">庫存</div>
      </a>
      <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('module-wardrobe.html')">
        <div class="ni-icon">👗</div>
        <div class="ni-label">衣櫥</div>
      </a>
      <a href="javascript:void(0)" class="nav-item active">
        <div class="ni-icon">📖</div>
        <div class="ni-label">百科</div>
      </a>
    </div>
  </div>

  <div class="modal" id="detailModal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">書籤詳情</div>
        <div class="modal-close" onclick="closeModal()">✕</div>
      </div>

      <div id="viewMode">
        <div class="detail-section">
          <div class="detail-label">標題</div>
          <div class="detail-value" id="detailTitle">-</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">分類</div>
          <div class="detail-value" id="detailCategory">-</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">網址</div>
          <div class="detail-value"><a id="detailUrl" href="#" target="_blank" style="color: var(--pink-main);">-</a></div>
        </div>
        <div class="detail-section">
          <div class="detail-label">標籤</div>
          <div class="detail-value" id="detailTags">-</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">備註</div>
          <div class="detail-value" id="detailNote">-</div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="closeModal()">關閉</button>
          <button class="btn btn-primary" onclick="switchToEditMode()">✏️ 編輯</button>
        </div>
      </div>

      <div id="editMode" class="hidden">
        <form id="articleForm" onsubmit="saveArticle(event)">
          <div class="form-group">
            <label class="form-label">標題 *</label>
            <input type="text" id="title" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label">分類 *</label>
            <select id="category" class="form-select" required>
              <option value="recipe">🍳 食譜</option>
              <option value="health">💚 健康</option>
              <option value="baby">👶 育兒</option>
              <option value="home">🏠 居家</option>
              <option value="finance">💰 財務</option>
              <option value="travel">✈️ 旅遊</option>
              <option value="tool">🔧 工具</option>
              <option value="memo">📝 備忘</option>
              <option value="other">📌 其他</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">網址 *</label>
            <input type="url" id="url" class="form-input" required placeholder="https://...">
          </div>
          <div class="form-group">
            <label class="form-label">標籤（用空格分隔）</label>
            <input type="text" id="tags" class="form-input" placeholder="如：副食品 寶寶 食譜">
          </div>
          <div class="form-group">
            <label class="form-label">備註</label>
            <input type="text" id="note" class="form-input" placeholder="添加備註...">
          </div>
          <div class="modal-actions">
            <button type="button" class="btn btn-secondary" onclick="switchToViewMode()">返回</button>
            <button type="button" class="btn btn-danger" id="deleteBtn" style="display: none;" onclick="deleteArticle()">🗑️ 刪除</button>
            <button type="submit" class="btn btn-primary">💾 儲存</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    let roomCode = '';
    let articles = [];
    let editingId = null;
    let currentDetailData = null;

    const categoryNames = { recipe: '🍳 食譜', health: '💚 健康', baby: '👶 育兒', home: '🏠 居家', finance: '💰 財務', travel: '✈️ 旅遊', tool: '🔧 工具', memo: '📝 備忘', other: '📌 其他' };

    async function init() {
      updateTime();
      roomCode = await getRoomCode();
      setInterval(updateTime, 1000);
      document.addEventListener('firebaseReady', () => {
        loadArticles();
        fbManager.listenToCollection('wiki', roomCode, (data) => {
          articles = data;
          renderArticles();
        });
      });
      if (fbManager.initialized) loadArticles();
    }

    async function loadArticles() {
      try {
        articles = await fbManager.read('wiki', roomCode);
        renderArticles();
      } catch (err) {
        console.error('加載書籤失敗:', err);
      }
    }

    function renderArticles() {
      const favorites = articles.filter(a => a.isFavorite);
      document.getElementById('favCount').textContent = favorites.length;

      if (favorites.length === 0) {
        document.getElementById('favSection').style.display = 'none';
      } else {
        document.getElementById('favSection').style.display = 'block';
        document.getElementById('favList').innerHTML = favorites.map(a => `
          <div class="fav-item" onclick="openDetailModal('${a.id}')">
            <div style="flex: 1;">
              <div style="font-weight: 500;">${a.title}</div>
              <div style="font-size: 11px; color: var(--text-light); margin-top: 2px;">${categoryNames[a.category]}</div>
            </div>
            <span style="font-size: 14px;">→</span>
          </div>
        `).join('');
      }

      if (articles.length === 0) {
        document.getElementById('articleGrid').innerHTML = '<div class="empty-state">還沒有書籤</div>';
      } else {
        document.getElementById('articleGrid').innerHTML = articles.map(a => `
          <div class="article-card" onclick="openDetailModal('${a.id}')">
            <div class="article-header">
              <div style="flex: 1;">
                <div class="article-title">${a.title}</div>
                <div class="article-category">${categoryNames[a.category]}</div>
              </div>
              <span class="article-star" onclick="toggleFavorite('${a.id}', event)">${a.isFavorite ? '⭐' : '☆'}</span>
            </div>
          </div>
        `).join('');
      }
    }

    async function toggleFavorite(id, event) {
      event.stopPropagation();
      const item = articles.find(a => a.id === id);
      if (!item) return;
      item.isFavorite = !item.isFavorite;
      try {
        await fbManager.write('wiki', roomCode, id, item);
        await loadArticles();
      } catch (err) {
        console.error('更新失敗:', err);
      }
    }

    async function saveArticle(event) {
      event.preventDefault();
      const data = {
        title: document.getElementById('title').value,
        category: document.getElementById('category').value,
        url: document.getElementById('url').value,
        tags: document.getElementById('tags').value.split(' ').filter(t => t),
        note: document.getElementById('note').value,
        isFavorite: editingId ? (articles.find(a => a.id === editingId)?.isFavorite || false) : false
      };
      try {
        if (editingId) {
          await fbManager.write('wiki', roomCode, editingId, data);
        } else {
          const id = fbManager.generateId();
          await fbManager.write('wiki', roomCode, id, data);
        }
        closeModal();
        await loadArticles();
      } catch (err) {
        console.error('保存失敗:', err);
        alert('保存失敗');
      }
    }

    async function deleteArticle() {
      if (!editingId || !confirm('確定要刪除嗎？')) return;
      try {
        await fbManager.delete('wiki', roomCode, editingId);
        closeModal();
        await loadArticles();
      } catch (err) {
        console.error('刪除失敗:', err);
      }
    }

    function openAddModal() {
      editingId = null;
      document.getElementById('deleteBtn').style.display = 'none';
      document.getElementById('articleForm').reset();
      document.getElementById('viewMode').classList.add('hidden');
      document.getElementById('editMode').classList.remove('hidden');
      document.getElementById('detailModal').classList.add('active');
    }

    function openDetailModal(id) {
      const item = articles.find(a => a.id === id);
      if (!item) return;
      editingId = id;
      currentDetailData = item;
      document.getElementById('detailTitle').textContent = item.title;
      document.getElementById('detailCategory').textContent = categoryNames[item.category];
      document.getElementById('detailUrl').href = item.url;
      document.getElementById('detailUrl').textContent = item.url;
      document.getElementById('detailTags').textContent = item.tags && item.tags.length ? item.tags.join('、') : '-';
      document.getElementById('detailNote').textContent = item.note || '-';
      document.getElementById('viewMode').classList.remove('hidden');
      document.getElementById('editMode').classList.add('hidden');
      document.getElementById('detailModal').classList.add('active');
    }

    function switchToEditMode() {
      if (!currentDetailData) return;
      document.getElementById('title').value = currentDetailData.title;
      document.getElementById('category').value = currentDetailData.category;
      document.getElementById('url').value = currentDetailData.url;
      document.getElementById('tags').value = currentDetailData.tags ? currentDetailData.tags.join(' ') : '';
      document.getElementById('note').value = currentDetailData.note || '';
      document.getElementById('deleteBtn').style.display = 'block';
      document.getElementById('viewMode').classList.add('hidden');
      document.getElementById('editMode').classList.remove('hidden');
    }

    function switchToViewMode() {
      document.getElementById('viewMode').classList.remove('hidden');
      document.getElementById('editMode').classList.add('hidden');
    }

    function closeModal() {
      document.getElementById('detailModal').classList.remove('active');
      editingId = null;
    }

    function updateTime() {
      const now = new Date();
      document.getElementById('currentTime').textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
    }

    function goHome() { window.location.href = `index.html?room=${roomCode}`; }
    function navigateTo(page) { window.location.href = `${page}?room=${roomCode}`; }

    init();
  </script>
</body>
</html>
