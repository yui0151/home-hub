<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家庭數位管家 — 庫存管理</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FDF6F7;
      --white: #FFFFFF;
      --pink-light: #F4C5C9;
      --pink-mid: #EFA5A8;
      --pink-main: #C36D78;
      --pink-dark: #8C3A44;
      --text: #2D1B1E;
      --text-mid: #5C3D42;
      --text-light: #9B6B72;
      --border: #F4C5C9;
      --card: #FFFFFF;
      --danger: #C62828;
      --warning: #E65100;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }

    .phone-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .status-bar {
      height: 28px;
      background: rgba(253, 246, 247, 0.95);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 11px;
      color: var(--text);
      border-bottom: 1px solid var(--border);
    }

    .sb-time {
      font-size: 12px;
      font-weight: 700;
    }

    .app-header {
      background: rgba(253, 246, 247, 0.95);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 99;
    }

    .ah-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 18px;
      font-weight: 600;
    }

    .ah-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hbtn {
      font-size: 12px;
      background: var(--pink-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
      color: var(--text-mid);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .hbtn:hover {
      background: var(--pink-mid);
      color: white;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-bottom: 60px;
    }

    .screen-body {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    /* 統計卡 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 12px 16px;
    }

    .stat-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
    }

    .stat-num {
      font-family: 'Noto Serif TC', serif;
      font-size: 22px;
      font-weight: 400;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-num.danger {
      color: var(--danger);
    }

    .stat-label {
      font-size: 10px;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* 搜尋與篩選 */
    .search-inp {
      margin: 8px 16px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px;
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      width: calc(100% - 32px);
      display: block;
    }

    .filter-pills {
      display: flex;
      gap: 6px;
      padding: 0 16px 10px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filter-pills::-webkit-scrollbar {
      display: none;
    }

    .pill {
      white-space: nowrap;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11px;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.2s;
    }

    .pill.active {
      background: var(--pink-main);
      border-color: var(--pink-main);
      color: white;
      font-weight: 600;
    }

    /* Accordion */
    .acc-group {
      margin: 0 16px 8px;
    }

    .acc-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .acc-header:hover {
      border-color: var(--pink-main);
    }

    .acc-header input[type="checkbox"] {
      cursor: pointer;
    }

    .acc-name {
      font-size: 12px;
      font-weight: 600;
      flex: 1;
      color: var(--text);
    }

    .acc-count {
      font-size: 10px;
      background: var(--pink-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2px 8px;
      color: var(--pink-main);
      font-weight: 600;
    }

    .acc-items {
      display: none;
      margin-top: 4px;
      flex-direction: column;
      gap: 4px;
    }

    .acc-items.open {
      display: flex;
    }

    /* 庫存項目 */
    .inv-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      position: relative;
      overflow: hidden;
      transition: all 0.2s;
      cursor: pointer;
    }

    .inv-item:hover {
      border-color: var(--pink-main);
      background: rgba(253, 246, 247, 0.5);
    }

    .inv-item.selected {
      background: rgba(195, 109, 120, 0.1);
      border-color: var(--pink-main);
    }

    .inv-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      border-radius: 10px 0 0 10px;
    }

    .inv-item.ok::before {
      background: var(--pink-mid);
    }

    .inv-item.low::before {
      background: var(--danger);
    }

    .inv-checkbox {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: var(--pink-main);
    }

    .inv-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      background: var(--pink-light);
    }

    .inv-body {
      flex: 1;
      min-width: 0;
    }

    .inv-name {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 2px;
    }

    .inv-loc {
      font-size: 10px;
      color: var(--text-light);
    }

    .inv-right {
      text-align: right;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
    }

    .inv-qty {
      font-family: 'Noto Serif TC', serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 1;
    }

    .inv-qty.low {
      color: var(--danger);
      font-weight: 600;
    }

    .inv-unit {
      font-size: 10px;
      color: var(--text-light);
    }

    .qty-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 3px;
    }

    .qty-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text);
      transition: all 0.2s;
    }

    .qty-btn:hover {
      border-color: var(--pink-main);
      background: var(--pink-light);
    }

    /* 底部導覽 */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(253, 246, 247, 0.98);
      backdrop-filter: blur(10px);
      border-top: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 8px 0 4px;
      z-index: 101;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      opacity: 0.5;
      cursor: pointer;
      padding: 0 12px;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s;
    }

    .nav-item.active {
      opacity: 1;
    }

    .ni-icon {
      font-size: 20px;
      line-height: 1;
    }

    .ni-label {
      font-size: 10px;
      letter-spacing: 0.05em;
      color: var(--text-light);
      font-weight: 500;
    }

    .nav-item.active .ni-label {
      color: var(--pink-main);
      font-weight: 700;
    }

    /* FAB */
    .fab {
      position: fixed;
      bottom: 72px;
      right: 16px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--pink-main);
      color: white;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(195, 109, 120, 0.3);
      cursor: pointer;
      transition: all 0.2s;
      z-index: 50;
    }

    .fab:hover {
      background: var(--pink-dark);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 200;
      align-items: flex-end;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--card);
      width: 100%;
      border-radius: 20px 20px 0 0;
      padding: 24px 16px 32px;
      max-height: 85vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .modal-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 20px;
      font-weight: 600;
    }

    .modal-close {
      font-size: 20px;
      cursor: pointer;
      color: var(--text-light);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--pink-main);
      text-transform: uppercase;
      margin-bottom: 6px;
      display: block;
    }

    .form-input, .form-select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 14px;
      color: var(--text);
    }

    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: var(--pink-main);
      box-shadow: 0 0 0 3px rgba(195, 109, 120, 0.1);
    }

    .form-actions {
      display: flex;
      gap: 8px;
      margin-top: 24px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif;
    }

    .btn-primary {
      background: var(--pink-main);
      color: white;
    }

    .btn-secondary {
      background: var(--bg);
      border: 1.5px solid var(--border);
      color: var(--text-mid);
    }

    .btn-danger {
      background: rgba(198, 40, 40, 0.1);
      color: var(--danger);
    }
  </style>
  <script src="firebase-config.js"></script>
</head>
<body>
  <div class="phone-container">
    <div class="status-bar">
      <span class="sb-time" id="currentTime">09:18</span>
      <span>📶 🔋</span>
    </div>

    <div class="app-header">
      <div class="ah-title">庫存管理</div>
      <div class="ah-right">
        <button class="hbtn" onclick="goHome()">🏡</button>
      </div>
    </div>

    <div class="main-content">
      <div class="screen-body">
        <!-- 統計卡 -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-num">
              <span id="totalCount">0</span>
            </div>
            <div class="stat-label">品項數</div>
          </div>
          <div class="stat-card">
            <div class="stat-num danger">
              <span id="lowStockCount">0</span>
            </div>
            <div class="stat-label">庫存不足</div>
          </div>
          <div class="stat-card">
            <div class="stat-num">
              <span id="categoryCount">0</span>
            </div>
            <div class="stat-label">分類數</div>
          </div>
        </div>

        <!-- 搜尋 -->
        <input class="search-inp" placeholder="🔍 搜尋品項..." id="searchInput" onkeyup="filterItems()">

        <!-- 篩選 -->
        <div class="filter-pills" id="filterPills"></div>

        <!-- 分類列表 -->
        <div id="categoryList"></div>

        <div style="height: 20px;"></div>
      </div>
    </div>

    <!-- 浮動按鈕 -->
    <div class="fab" onclick="openAddModal()">＋</div>

    <!-- 底部導覽 -->
    <div class="bottom-nav">
      <a href="javascript:void(0)" class="nav-item" onclick="goHome()">
        <div class="ni-icon">🏡</div>
        <div class="ni-label">首頁</div>
      </a>
      <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('module-reminders.html')">
        <div class="ni-icon">📋</div>
        <div class="ni-label">提醒</div>
      </a>
      <a href="javascript:void(0)" class="nav-item active">
        <div class="ni-icon">📦</div>
        <div class="ni-label">庫存</div>
      </a>
      <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('module-wardrobe.html')">
        <div class="ni-icon">👗</div>
        <div class="ni-label">衣櫥</div>
      </a>
      <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('module-wiki.html')">
        <div class="ni-icon">📖</div>
        <div class="ni-label">百科</div>
      </a>
    </div>
  </div>

  <!-- 新增/編輯 Modal -->
  <div class="modal" id="formModal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="formTitle">新增品項</div>
        <div class="modal-close" onclick="closeModal()">✕</div>
      </div>

      <form id="inventoryForm" onsubmit="saveItem(event)">
        <div class="form-group">
          <label class="form-label">品項名稱 *</label>
          <input type="text" id="name" class="form-input" placeholder="例：白米" required>
        </div>

        <div class="form-group">
          <label class="form-label">分類 *</label>
          <select id="category" class="form-select" required>
            <option value="">選擇分類</option>
            <option value="food">🥫 食品</option>
            <option value="drink">🥤 飲料</option>
            <option value="frozen">❄️ 冷凍</option>
            <option value="clean">🧹 清潔</option>
            <option value="bath">🚿 浴室</option>
            <option value="medical">💊 藥品</option>
            <option value="baby">🍼 嬰幼兒</option>
            <option value="kitchen">🥄 廚房</option>
            <option value="pet">🐾 寵物</option>
            <option value="office">📝 文具</option>
            <option value="other">其他</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">數量 *</label>
          <input type="number" id="quantity" class="form-input" placeholder="0" required min="0">
        </div>

        <div class="form-group">
          <label class="form-label">單位 *</label>
          <input type="text" id="unit" class="form-input" placeholder="個/盒/包/瓶/kg" required>
        </div>

        <div class="form-group">
          <label class="form-label">警告值</label>
          <input type="number" id="threshold" class="form-input" placeholder="0" min="0">
        </div>

        <div class="form-group">
          <label class="form-label">位置</label>
          <input type="text" id="location" class="form-input" placeholder="例：冰箱/廚房">
        </div>

        <div class="form-group">
          <label class="form-label">備註</label>
          <input type="text" id="note" class="form-input" placeholder="添加備註...">
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
          <button type="button" class="btn btn-danger" id="deleteBtn" style="display: none;" onclick="deleteItem()">刪除</button>
          <button type="submit" class="btn btn-primary">儲存</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let roomCode = '';
    let items = [];
    let editingId = null;

    const categories = [
      { icon: '🥫', name: 'food', label: '食品', color: '#E67E22' },
      { icon: '🥤', name: 'drink', label: '飲料', color: '#3498DB' },
      { icon: '❄️', name: 'frozen', label: '冷凍', color: '#A8D8EA' },
      { icon: '🧹', name: 'clean', label: '清潔', color: '#2ECC71' },
      { icon: '🚿', name: 'bath', label: '浴室', color: '#E74C3C' },
      { icon: '💊', name: 'medical', label: '藥品', color: '#9B59B6' },
      { icon: '🍼', name: 'baby', label: '嬰幼兒', color: '#F39C12' },
      { icon: '🥄', name: 'kitchen', label: '廚房', color: '#1ABC9C' },
      { icon: '🐾', name: 'pet', label: '寵物', color: '#795548' },
      { icon: '📝', name: 'office', label: '文具', color: '#607D8B' },
      { icon: '📦', name: 'other', label: '其他', color: '#95A5A6' }
    ];

    // ═══════════════════════════════════════════════════════════
    // 初始化
    // ═══════════════════════════════════════════════════════════

    async function init() {
      updateTime();
      roomCode = await getRoomCode();
      setInterval(updateTime, 1000);

      document.addEventListener('firebaseReady', () => {
        loadItems();
        fbManager.listenToCollection('inventory', roomCode, (data) => {
          items = data;
          renderItems();
        });
      });

      if (fbManager.initialized) {
        loadItems();
      }
    }

    // ═══════════════════════════════════════════════════════════
    // 資料操作
    // ═══════════════════════════════════════════════════════════

    async function loadItems() {
      try {
        items = await fbManager.read('inventory', roomCode);
        renderItems();
      } catch (err) {
        console.error('加載庫存失敗:', err);
      }
    }

    async function saveItem(event) {
      event.preventDefault();

      const data = {
        name: document.getElementById('name').value,
        category: document.getElementById('category').value,
        quantity: parseInt(document.getElementById('quantity').value) || 0,
        unit: document.getElementById('unit').value,
        threshold: parseInt(document.getElementById('threshold').value) || 0,
        location: document.getElementById('location').value,
        note: document.getElementById('note').value
      };

      try {
        if (editingId) {
          await fbManager.write('inventory', roomCode, editingId, data);
        } else {
          const id = fbManager.generateId();
          await fbManager.write('inventory', roomCode, id, data);
        }
        closeModal();
        await loadItems();
      } catch (err) {
        console.error('保存失敗:', err);
        alert('保存失敗');
      }
    }

    async function deleteItem() {
      if (!editingId || !confirm('確定要刪除嗎？')) return;

      try {
        await fbManager.delete('inventory', roomCode, editingId);
        closeModal();
        await loadItems();
      } catch (err) {
        console.error('刪除失敗:', err);
        alert('刪除失敗');
      }
    }

    async function updateQuantity(id, delta) {
      const item = items.find(i => i.id === id);
      if (!item) return;

      item.quantity = Math.max(0, item.quantity + delta);

      try {
        await fbManager.write('inventory', roomCode, id, item);
        await loadItems();
      } catch (err) {
        console.error('更新失敗:', err);
      }
    }

    // ═══════════════════════════════════════════════════════════
    // UI 更新
    // ═══════════════════════════════════════════════════════════

    function updateTime() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const mins = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('currentTime').textContent = `${hours}:${mins}`;
    }

    function renderItems() {
      // 統計
      const lowStock = items.filter(i => i.quantity <= i.threshold && i.threshold > 0).length;
      const categorySet = new Set(items.map(i => i.category));

      document.getElementById('totalCount').textContent = items.length;
      document.getElementById('lowStockCount').textContent = lowStock;
      document.getElementById('categoryCount').textContent = categorySet.size;

      // 分組
      const grouped = {};
      items.forEach(item => {
        if (!grouped[item.category]) grouped[item.category] = [];
        grouped[item.category].push(item);
      });

      document.getElementById('categoryList').innerHTML = Object.entries(grouped)
        .map(([catName, catItems]) => {
          const cat = categories.find(c => c.name === catName);
          return `
            <div class="acc-group">
              <div class="acc-header" onclick="toggleCategory(this)">
                <div class="acc-dot" style="background: ${cat?.color || '#999'}"></div>
                <div class="acc-name">${cat?.icon} ${cat?.label}</div>
                <div class="acc-count">${catItems.length}</div>
              </div>
              <div class="acc-items">
                ${catItems.map(item => `
                  <div class="inv-item ${item.quantity <= item.threshold && item.threshold > 0 ? 'low' : 'ok'}" onclick="openEditModal('${item.id}')">
                    <div class="inv-icon">📦</div>
                    <div class="inv-body">
                      <div class="inv-name">${item.name}</div>
                      <div class="inv-loc">📍 ${item.location || '未設置'}</div>
                    </div>
                    <div class="inv-right">
                      <div class="inv-qty ${item.quantity <= item.threshold && item.threshold > 0 ? 'low' : ''}">${item.quantity}</div>
                      <div class="inv-unit">${item.unit}</div>
                      <div class="qty-row">
                        <button class="qty-btn" onclick="updateQuantity('${item.id}', -1); event.stopPropagation();">−</button>
                        <button class="qty-btn" onclick="updateQuantity('${item.id}', +1); event.stopPropagation();">+</button>
                      </div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        }).join('');

      renderFilters();
    }

    function renderFilters() {
      const pills = document.getElementById('filterPills');
      pills.innerHTML = categories.map(cat => {
        const count = items.filter(i => i.category === cat.name).length;
        return `
          <div class="pill" onclick="filterByCategory('${cat.name}')" title="${count} 項">
            ${cat.icon} ${cat.label}
          </div>
        `;
      }).join('');
    }

    function toggleCategory(header) {
      header.nextElementSibling.classList.toggle('open');
    }

    // ═══════════════════════════════════════════════════════════
    // Modal 操作
    // ═══════════════════════════════════════════════════════════

    function openAddModal() {
      editingId = null;
      document.getElementById('formTitle').textContent = '新增品項';
      document.getElementById('deleteBtn').style.display = 'none';
      document.getElementById('inventoryForm').reset();
      document.getElementById('formModal').classList.add('active');
    }

    function openEditModal(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;

      editingId = id;
      document.getElementById('formTitle').textContent = '編輯品項';
      document.getElementById('deleteBtn').style.display = 'block';
      
      document.getElementById('name').value = item.name;
      document.getElementById('category').value = item.category;
      document.getElementById('quantity').value = item.quantity;
      document.getElementById('unit').value = item.unit;
      document.getElementById('threshold').value = item.threshold || 0;
      document.getElementById('location').value = item.location || '';
      document.getElementById('note').value = item.note || '';

      document.getElementById('formModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('formModal').classList.remove('active');
      editingId = null;
    }

    function goHome() {
      window.location.href = `index.html?room=${roomCode}`;
    }

    function navigateTo(page) {
      window.location.href = `${page}?room=${roomCode}`;
    }

    init();
  </script>
