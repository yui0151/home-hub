<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Firebase 設定 ─────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAFGSQOvAp1thZkWBZ-nLHe-uR8llDQDI8",
  authDomain: "home-hub-be41f.firebaseapp.com",
  projectId: "home-hub-be41f",
  storageBucket: "home-hub-be41f.firebasestorage.app",
  messagingSenderId: "286497032414",
  appId: "1:286497032414:web:16d3f0242a400d0de85a4f"
};

let db;
try {
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  db.enablePersistence().catch(() => {});
} catch(e) {}

// ─── 常數 ──────────────────────────────────────────
const VERSION = "v3.0";
const ROOM_KEY = "hh_roomCode";
const MEMO_KEY = "hh_memo";
const TODO_KEY = "hh_todo";
const SHOP_KEY = "hh_shop";

const categoryIcon = {
  food:'🍱', drink:'🧴', frozen:'🧊', clean:'🧹', bath:'🛁',
  medical:'💊', baby:'🍼', kitchen:'🍳', pet:'🐾', office:'📎', other:'📦'
};

// ─── 天氣 Hook ─────────────────────────────────────
function useWeather() {
  const [weather, setWeather] = useState(null);
  useEffect(() => {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(async pos => {
      try {
        const { latitude: lat, longitude: lon } = pos.coords;
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode&daily=temperature_2m_max,temperature_2m_min&timezone=Asia%2FTaipei&forecast_days=1`);
        const d = await res.json();
        const code = d.current.weathercode;
        const temp = Math.round(d.current.temperature_2m);
        const max = Math.round(d.daily.temperature_2m_max[0]);
        const min = Math.round(d.daily.temperature_2m_min[0]);
        const getIcon = c => {
          if (c === 0) return '☀️';
          if (c <= 3) return '⛅';
          if (c <= 48) return '🌫️';
          if (c <= 67) return '🌧️';
          if (c <= 77) return '❄️';
          if (c <= 82) return '🌦️';
          return '⛈️';
        };
        const getTip = t => {
          if (t >= 30) return '天氣炎熱，注意防曬補水';
          if (t >= 25) return '舒適溫暖，輕薄衣物即可';
          if (t >= 18) return '微涼，建議帶件薄外套';
          if (t >= 12) return '偏涼，記得穿外套';
          return '天氣寒冷，注意保暖';
        };
        setWeather({ temp, max, min, icon: getIcon(code), tip: getTip(temp) });
      } catch(e) {}
    }, () => {});
  }, []);
  return weather;
}

// ─── 主 App ────────────────────────────────────────
function App() {
  const [roomCode, setRoomCode] = useState(() => localStorage.getItem(ROOM_KEY) || '');
  const [inputCode, setInputCode] = useState('');
  const [showSettings, setShowSettings] = useState(false);

  // Firebase data
  const [reminders, setReminders] = useState([]);
  const [inventory, setInventory] = useState([]);
  const [wardrobe, setWardrobe] = useState([]);
  const [wiki, setWiki] = useState([]);
  const [loading, setLoading] = useState(false);

  // Quick record
  const [activeTab, setActiveTab] = useState('memo');
  const [memo, setMemo] = useState(() => localStorage.getItem(MEMO_KEY + '_' + (localStorage.getItem(ROOM_KEY) || '')) || '');
  const [todos, setTodos] = useState(() => JSON.parse(localStorage.getItem(TODO_KEY + '_' + (localStorage.getItem(ROOM_KEY) || '')) || '[]'));
  const [shopping, setShopping] = useState(() => JSON.parse(localStorage.getItem(SHOP_KEY + '_' + (localStorage.getItem(ROOM_KEY) || '')) || '[]'));
  const [todoInput, setTodoInput] = useState('');
  const [shopInput, setShopInput] = useState('');
  const [memoSaved, setMemoSaved] = useState(true);
  const memoTimer = useRef(null);

  const weather = useWeather();

  // ── 登入 ──
  const login = () => {
    const code = inputCode.trim().toUpperCase();
    if (!code) return;
    localStorage.setItem(ROOM_KEY, code);
    setRoomCode(code);
  };

  const logout = () => {
    localStorage.removeItem(ROOM_KEY);
    setRoomCode('');
    setShowSettings(false);
  };

  // ── Firebase 訂閱 ──
  useEffect(() => {
    if (!roomCode || !db) return;
    setLoading(true);
    const unsubs = [];

    const sub = (col, setter) => {
      const u = db.collection(col).doc(roomCode).collection('items')
        .onSnapshot(snap => {
          setter(snap.docs.map(d => ({ id: d.id, ...d.data() })));
          setLoading(false);
        }, () => setLoading(false));
      unsubs.push(u);
    };

    sub('reminders', setReminders);
    sub('inventory', setInventory);
    sub('wardrobe', setWardrobe);

    const wikiUnsub = db.collection('wiki').doc(roomCode).collection('articles')
      .onSnapshot(snap => {
        setWiki(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      }, () => {});
    unsubs.push(wikiUnsub);

    return () => unsubs.forEach(u => u());
  }, [roomCode]);

  // ── 備忘錄自動儲存 ──
  useEffect(() => {
    if (!roomCode) return;
    setMemoSaved(false);
    clearTimeout(memoTimer.current);
    memoTimer.current = setTimeout(() => {
      localStorage.setItem(MEMO_KEY + '_' + roomCode, memo);
      setMemoSaved(true);
    }, 800);
  }, [memo, roomCode]);

  // ── Todo 儲存 ──
  useEffect(() => {
    if (!roomCode) return;
    localStorage.setItem(TODO_KEY + '_' + roomCode, JSON.stringify(todos));
  }, [todos, roomCode]);

  // ── Shopping 儲存 ──
  useEffect(() => {
    if (!roomCode) return;
    localStorage.setItem(SHOP_KEY + '_' + roomCode, JSON.stringify(shopping));
  }, [shopping, roomCode]);

  // ── 計算資料 ──
  const today = dayjs();
  const urgentItems = reminders.filter(r => {
    if (r.status === 'completed') return false;
    if (!r.dueDate) return false;
    const diff = dayjs(r.dueDate).diff(today, 'day');
    return diff >= 0 && diff <= 3;
  }).sort((a,b) => dayjs(a.dueDate).diff(dayjs(b.dueDate)));

  const thisMonth = today.format('YYYY-MM');
  const financeItems = reminders.filter(r =>
    (r.type === 'financial' || r.type === 'subscription') && r.dueDate?.startsWith(thisMonth)
  ).sort((a,b) => dayjs(a.dueDate).diff(dayjs(b.dueDate)));
  const financeTotal = financeItems.reduce((s, r) => s + (Number(r.amount) || 0), 0);
  const financePaid = financeItems.filter(r => r.status === 'completed').reduce((s,r) => s + (Number(r.amount)||0), 0);

  const lowStock = inventory.filter(r => {
    if (r.threshold === 0 || r.threshold === '0') return Number(r.quantity) === 0;
    return Number(r.quantity) <= Number(r.threshold);
  });

  const pinnedWiki = wiki.filter(w => w.pinned);

  // ── Todo 操作 ──
  const addTodo = () => {
    if (!todoInput.trim()) return;
    setTodos(p => [...p, { id: Date.now(), text: todoInput.trim(), done: false }]);
    setTodoInput('');
  };
  const toggleTodo = id => setTodos(p => p.map(t => t.id === id ? { ...t, done: !t.done } : t));
  const delTodo = id => setTodos(p => p.filter(t => t.id !== id));

  const addShop = () => {
    if (!shopInput.trim()) return;
    setShopping(p => [...p, { id: Date.now(), text: shopInput.trim(), done: false }]);
    setShopInput('');
  };
  const toggleShop = id => setShopping(p => p.map(t => t.id === id ? { ...t, done: !t.done } : t));
  const delShop = id => setShopping(p => p.filter(t => t.id !== id));

  // ── 問候語 ──
  const hour = today.hour();
  const greeting = hour < 6 ? '夜深了，注意休息' : hour < 12 ? '早安' : hour < 18 ? '午安' : '晚安';
  const dateStr = today.format('MM月DD日');
  const weekDays = ['日','一','二','三','四','五','六'];
  const weekStr = `週${weekDays[today.day()]}`;

  // ── URL helper ──
  const moduleUrl = mod => `./${mod}.html?room=${roomCode}`;

  // ── 未登入 ──
  if (!roomCode) {
    return (
      <div className="login-wrap">
        <div className="login-card">
          <div className="login-logo">
            <span className="emoji">🏡</span>
            <h1>家庭數位管家</h1>
            <p>輸入家庭房間碼，開始使用</p>
          </div>
          <input
            className="login-input"
            placeholder="輸入房間碼"
            value={inputCode}
            onChange={e => setInputCode(e.target.value.toUpperCase())}
            onKeyDown={e => e.key === 'Enter' && login()}
            maxLength={10}
          />
          <button className="login-btn" onClick={login}>進入我的家庭 →</button>
          <p className="login-hint">房間碼由家庭成員共享<br/>資料存儲於雲端，跨裝置同步</p>
        </div>
      </div>
    );
  }

  return (
    <div className="app-wrap">
      {/* Header */}
      <div className="header">
        <div className="header-left">
          <h2>{dateStr} {weekStr} · {greeting}</h2>
          <h1>嘟嘟一家 🏡</h1>
        </div>
        <div className="header-right">
          {loading && <div style={{display:'flex',alignItems:'center',gap:3,padding:'0 8px'}}>
            <div className="loading-dot" style={{animationDelay:'0s'}}/>
            <div className="loading-dot" style={{animationDelay:'0.2s'}}/>
            <div className="loading-dot" style={{animationDelay:'0.4s'}}/>
          </div>}
          <button className="icon-btn" onClick={() => setShowSettings(true)}>⚙️</button>
        </div>
      </div>

      <div className="content">

        {/* 天氣 */}
        {weather && (
          <div className="weather-card">
            <div className="weather-icon">{weather.icon}</div>
            <div className="weather-info">
              <div className="weather-temp">{weather.temp}°C</div>
              <div className="weather-range">最高 {weather.max}° · 最低 {weather.min}°</div>
              <div className="weather-tip">{weather.tip}</div>
            </div>
          </div>
        )}

        {/* 四格統計 */}
        <div className="stats-grid">
          <a className="stat-card" href={moduleUrl('module-reminders')} style={{textDecoration:'none',color:'inherit'}}>
            <div className="stat-icon">⚡</div>
            <div className={`stat-num ${urgentItems.length > 0 ? 'alert' : ''}`}>{urgentItems.length}</div>
            <div className="stat-label">急件提醒</div>
          </a>
          <a className="stat-card" href={moduleUrl('module-inventory')} style={{textDecoration:'none',color:'inherit'}}>
            <div className="stat-icon">📦</div>
            <div className={`stat-num ${lowStock.length > 0 ? 'alert' : ''}`}>{lowStock.length}</div>
            <div className="stat-label">低庫存品項</div>
          </a>
          <a className="stat-card" href={moduleUrl('module-wardrobe')} style={{textDecoration:'none',color:'inherit'}}>
            <div className="stat-icon">👗</div>
            <div className="stat-num">{wardrobe.length}</div>
            <div className="stat-label">衣物總數</div>
          </a>
          <a className="stat-card" href={moduleUrl('module-wiki')} style={{textDecoration:'none',color:'inherit'}}>
            <div className="stat-icon">📖</div>
            <div className="stat-num">{wiki.length}</div>
            <div className="stat-label">知識書籤</div>
          </a>
        </div>

        {/* ⚡ 快速記錄 */}
        <div>
          <div className="sec-head">
            <span className="sec-title">📌 快速記錄</span>
          </div>
          <div className="quick-card">
            <div className="quick-tabs">
              {[
                { key: 'memo', label: '📝 備忘錄' },
                { key: 'todo', label: '✅ 待辦' },
                { key: 'shop', label: '🛍️ 待買' },
              ].map(t => (
                <button
                  key={t.key}
                  className={`quick-tab ${activeTab === t.key ? 'active' : ''}`}
                  onClick={() => setActiveTab(t.key)}
                >
                  {t.label}
                </button>
              ))}
            </div>

            <div className="quick-body">
              {activeTab === 'memo' && (
                <div>
                  <textarea
                    className="memo-area"
                    placeholder="隨手記下任何事情..."
                    value={memo}
                    onChange={e => setMemo(e.target.value)}
                    rows={5}
                  />
                  <div className="memo-status">
                    {memoSaved ? <><span>✓</span> 已儲存</> : <><span className="loading-dot" style={{width:5,height:5}}/> 儲存中</>}
                  </div>
                </div>
              )}

              {activeTab === 'todo' && (
                <div>
                  <div className="list-add-row">
                    <input
                      className="list-add-input"
                      placeholder="新增待辦事項..."
                      value={todoInput}
                      onChange={e => setTodoInput(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && addTodo()}
                    />
                    <button className="list-add-btn" onClick={addTodo}>＋</button>
                  </div>
                  {todos.length === 0
                    ? <div className="list-empty">沒有待辦事項</div>
                    : todos.map(t => (
                        <div key={t.id} className="list-item">
                          <button
                            className={`list-check ${t.done ? 'done' : ''}`}
                            onClick={() => toggleTodo(t.id)}
                          >{t.done ? '✓' : ''}</button>
                          <span className={`list-text ${t.done ? 'done' : ''}`}>{t.text}</span>
                          <button className="list-del" onClick={() => delTodo(t.id)}>✕</button>
                        </div>
                    ))
                  }
                </div>
              )}

              {activeTab === 'shop' && (
                <div>
                  <div className="list-add-row">
                    <input
                      className="list-add-input"
                      placeholder="新增待買項目..."
                      value={shopInput}
                      onChange={e => setShopInput(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && addShop()}
                    />
                    <button className="list-add-btn" onClick={addShop}>＋</button>
                  </div>
                  {shopping.length === 0
                    ? <div className="list-empty">沒有待買項目</div>
                    : shopping.map(t => (
                        <div key={t.id} className="list-item">
                          <button
                            className={`list-check ${t.done ? 'done' : ''}`}
                            onClick={() => toggleShop(t.id)}
                          >{t.done ? '✓' : ''}</button>
                          <span className={`list-text ${t.done ? 'done' : ''}`}>{t.text}</span>
                          <button className="list-del" onClick={() => delShop(t.id)}>✕</button>
                        </div>
                    ))
                  }
                </div>
              )}
            </div>
          </div>
        </div>

        {/* ⚡ 急件提醒 */}
        {urgentItems.length > 0 && (
          <div>
            <div className="sec-head">
              <span className="sec-title">⚡ 急件提醒</span>
              <a href={moduleUrl('module-reminders')} className="sec-more">查看全部 →</a>
            </div>
            <div className="urgent-list">
              {urgentItems.slice(0, 4).map(r => {
                const diff = dayjs(r.dueDate).diff(today, 'day');
                return (
                  <div key={r.id} className="urgent-item">
                    <div>
                      <div className="urgent-name">{r.title}</div>
                      <div className="urgent-date">
                        {diff === 0 ? '今天到期' : diff === 1 ? '明天到期' : `${diff} 天後到期`}
                      </div>
                    </div>
                    {r.amount && <div className="urgent-amount">NT${Number(r.amount).toLocaleString()}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* 💰 本月財務 */}
        {financeItems.length > 0 && (
          <div>
            <div className="sec-head">
              <span className="sec-title">💰 本月費用</span>
              <a href={moduleUrl('module-reminders')} className="sec-more">查看全部 →</a>
            </div>
            <div className="finance-card">
              <div className="finance-banner">
                <div>
                  <div className="finance-banner-label">本月應付 · 已付 NT${financePaid.toLocaleString()}</div>
                  <div className="finance-banner-amount">NT${financeTotal.toLocaleString()}</div>
                </div>
              </div>
              <div className="finance-list">
                {financeItems.map(r => (
                  <div key={r.id} className={`finance-item ${r.status === 'completed' ? 'paid' : ''}`}>
                    <div className="fi-name">
                      <span>{r.title}</span>
                      <span className={`fi-badge ${r.status === 'completed' ? 'paid' : ''}`}>
                        {r.status === 'completed' ? '已付' : dayjs(r.dueDate).format('MM/DD')}
                      </span>
                    </div>
                    <span className="fi-amt">NT${Number(r.amount||0).toLocaleString()}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* 📦 低庫存 */}
        {lowStock.length > 0 && (
          <div>
            <div className="sec-head">
              <span className="sec-title">📦 庫存不足</span>
              <a href={moduleUrl('module-inventory')} className="sec-more">查看全部 →</a>
            </div>
            <div className="stock-list">
              {lowStock.slice(0, 4).map(r => (
                <div key={r.id} className="stock-item">
                  <span className="stock-icon">{categoryIcon[r.category] || '📦'}</span>
                  <div className="stock-info">
                    <div className="stock-name">{r.name}</div>
                    <div className="stock-qty">剩 {r.quantity} {r.unit} · 警告值 {r.threshold}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* 📌 精選書籤 */}
        {pinnedWiki.length > 0 && (
          <div>
            <div className="sec-head">
              <span className="sec-title">📌 精選書籤</span>
              <a href={moduleUrl('module-wiki')} className="sec-more">查看全部 →</a>
            </div>
            <div className="bookmark-scroll">
              {pinnedWiki.map(w => (
                <a
                  key={w.id}
                  className="bookmark-item"
                  href={w.url || '#'}
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  {(w.imageUrl || w.og?.ogImage)
                    ? <img className="bookmark-img" src={w.imageUrl || w.og?.ogImage} alt="" onError={e => { e.target.style.display='none'; }} />
                    : <div className="bookmark-img-ph">📖</div>
                  }
                  <div className="bookmark-meta">
                    <div className="bookmark-title">{w.title}</div>
                    {w.domain && <div className="bookmark-domain">{w.domain}</div>}
                  </div>
                </a>
              ))}
            </div>
          </div>
        )}


      </div>

      {/* Bottom Nav */}
      <div className="bottom-nav">
        <span className="nav-btn active">
          <span className="nav-icon">🏡</span>首頁
        </span>
        <a className="nav-btn" href={moduleUrl('module-reminders')}>
          <span className="nav-icon">📋</span>提醒
        </a>
        <a className="nav-btn" href={moduleUrl('module-inventory')}>
          <span className="nav-icon">📦</span>庫存
        </a>
        <a className="nav-btn" href={moduleUrl('module-wardrobe')}>
          <span className="nav-icon">👗</span>衣櫥
        </a>
        <a className="nav-btn" href={moduleUrl('module-wiki')}>
          <span className="nav-icon">📖</span>百科
        </a>
      </div>

      {/* Settings Modal */}
      {showSettings && (
        <div className="modal-overlay" onClick={() => setShowSettings(false)}>
          <div className="modal-sheet" onClick={e => e.stopPropagation()}>
            <div className="modal-handle"/>
            <div className="modal-title">⚙️ 設定</div>

            <div className="settings-row">
              <span className="settings-label">家庭房間碼</span>
              <span className="settings-val" style={{fontWeight:600,letterSpacing:'0.1em'}}>{roomCode}</span>
            </div>
            <div className="settings-row">
              <span className="settings-label">雲端連線</span>
              <span className="settings-badge">已連線</span>
            </div>
            <div className="settings-row">
              <span className="settings-label">版本</span>
              <span className="settings-val">{VERSION}</span>
            </div>
            <div className="settings-row">
              <span className="settings-label">Firebase 專案</span>
              <span className="settings-val">home-hub-be41f</span>
            </div>

            <button className="logout-btn" onClick={logout}>登出此裝置</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
