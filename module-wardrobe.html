<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家庭數位管家 — 電子衣櫥</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FDF6F7;
      --white: #FFFFFF;
      --pink-light: #F4C5C9;
      --pink-mid: #EFA5A8;
      --pink-main: #C36D78;
      --pink-dark: #8C3A44;
      --text: #2D1B1E;
      --text-mid: #5C3D42;
      --text-light: #9B6B72;
      --border: #F4C5C9;
      --card: #FFFFFF;
      --success: #4CAF50;
      --warning: #E65100;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }

    .phone-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .status-bar {
      height: 28px;
      background: rgba(253, 246, 247, 0.95);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 11px;
      color: var(--text);
      border-bottom: 1px solid var(--border);
    }

    .sb-time {
      font-size: 12px;
      font-weight: 700;
    }

    .app-header {
      background: rgba(253, 246, 247, 0.95);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 99;
    }

    .ah-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 18px;
      font-weight: 600;
    }

    .ah-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hbtn {
      font-size: 12px;
      background: var(--pink-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
      color: var(--text-mid);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .hbtn:hover {
      background: var(--pink-mid);
      color: white;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-bottom: 60px;
    }

    .screen-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
    }

    /* 統計卡 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 12px 16px;
    }

    .stat-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 11px;
      padding: 10px 6px;
      text-align: center;
    }

    .stat-num {
      font-family: 'Noto Serif TC', serif;
      font-size: 18px;
      font-weight: 400;
      line-height: 1;
      margin-bottom: 3px;
    }

    .stat-label {
      font-size: 9px;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* 篩選 */
    .filter-pills {
      display: flex;
      gap: 6px;
      padding: 0 16px 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filter-pills::-webkit-scrollbar {
      display: none;
    }

    .pill {
      white-space: nowrap;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11px;
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.2s;
    }

    .pill.active {
      background: var(--pink-main);
      border-color: var(--pink-main);
      color: white;
      font-weight: 600;
    }

    /* 衣物網格 */
    .cloth-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 16px 20px;
    }

    .cloth-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s;
    }

    .cloth-card:hover {
      border-color: var(--pink-main);
      box-shadow: 0 4px 12px rgba(195, 109, 120, 0.15);
    }

    .cloth-card.selected {
      border-color: var(--pink-main);
      background: rgba(253, 246, 247, 0.5);
    }

    .cloth-img {
      width: 100%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      background: linear-gradient(135deg, var(--pink-light), #FAD4D8);
    }

    .cloth-body {
      padding: 8px 10px 10px;
    }

    .cloth-name {
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }

    .cloth-tags {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      gap: 4px;
    }

    .ctag {
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 8px;
    }

    .ctag-type {
      background: var(--pink-light);
      color: var(--pink-main);
      font-weight: 600;
    }

    .ctag-size {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-light);
    }

    .ctag-status {
      font-size: 8px;
      padding: 2px 5px;
      border-radius: 6px;
      font-weight: 600;
    }

    .st-cur {
      background: rgba(76, 175, 80, 0.15);
      color: #2E7D32;
    }

    .st-off {
      background: rgba(195, 109, 120, 0.15);
      color: var(--pink-main);
    }

    .st-small {
      background: rgba(230, 81, 0, 0.12);
      color: #BF360C;
    }

    .st-out {
      background: rgba(150, 150, 150, 0.15);
      color: #666;
    }

    /* 底部導覽 */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(253, 246, 247, 0.98);
      backdrop-filter: blur(10px);
      border-top: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 8px 0 4px;
      z-index: 101;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      opacity: 0.5;
      cursor: pointer;
      padding: 0 12px;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s;
    }

    .nav-item.active {
      opacity: 1;
    }

    .ni-icon {
      font-size: 20px;
      line-height: 1;
    }

    .ni-label {
      font-size: 10px;
      letter-spacing: 0.05em;
      color: var(--text-light);
      font-weight: 500;
    }

    .nav-item.active .ni-label {
      color: var(--pink-main);
      font-weight: 700;
    }

    /* FAB */
    .fab {
      position: fixed;
      bottom: 72px;
      right: 16px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--pink-main);
      color: white;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(195, 109, 120, 0.3);
      cursor: pointer;
      transition: all 0.2s;
      z-index: 50;
    }

    .fab:hover {
      background: var(--pink-dark);
    }
  </style>
</head>
<body>
  <div class="phone-container">
    <div class="status-bar">
      <span class="sb-time" id="currentTime">09:18</span>
      <span>📶 🔋</span>
    </div>

    <div class="app-header">
      <div class="ah-title">電子衣櫥</div>
      <div class="ah-right">
        <button class="hbtn" onclick="goHome()">🏡</button>
        <button class="hbtn" onclick="openCSV()">CSV</button>
      </div>
    </div>

    <div class="main-content">
      <div class="screen-body">
        <!-- 統計卡 -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-num">12</div>
            <div class="stat-label">總計</div>
          </div>
          <div class="stat-card">
            <div class="stat-num" style="color: #2E7D32;">7</div>
            <div class="stat-label">當季</div>
          </div>
          <div class="stat-card">
            <div class="stat-num" style="color: #E65100;">3</div>
            <div class="stat-label">非當季</div>
          </div>
          <div class="stat-card">
            <div class="stat-num" style="color: var(--text-light);">4</div>
            <div class="stat-label">未穿過</div>
          </div>
        </div>

        <!-- 類型篩選 -->
        <div class="filter-pills">
          <div class="pill active" onclick="filterType('all')">全部類型</div>
          <div class="pill" onclick="filterType('dress')">👗 洋裝</div>
          <div class="pill" onclick="filterType('jacket')">🧥 外套</div>
          <div class="pill" onclick="filterType('top')">👕 上衣</div>
          <div class="pill" onclick="filterType('other')">其他</div>
        </div>

        <!-- 狀態篩選 -->
        <div class="filter-pills">
          <div class="pill active" onclick="filterStatus('all')">全部狀態</div>
          <div class="pill" onclick="filterStatus('current')">當季</div>
          <div class="pill" onclick="filterStatus('storage')">非當季</div>
          <div class="pill" onclick="filterStatus('outgrown')">穿不下</div>
        </div>

        <!-- 衣物網格 -->
        <div class="cloth-grid" id="clothGrid"></div>

        <div style="height: 20px;"></div>
      </div>
    </div>

    <!-- 浮動按鈕 -->
    <div class="fab" onclick="addCloth()">＋</div>

    <!-- 底部導覽 -->
    <div class="bottom-nav">
      <a href="javascript:void(0)" class="nav-item" onclick="goHome()">
        <div class="ni-icon">🏡</div>
        <div class="ni-label">首頁</div>
      </a>
      <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('module-reminders.html')">
        <div class="ni-icon">📋</div>
        <div class="ni-label">提醒</div>
      </a>
      <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('module-inventory.html')">
        <div class="ni-icon">📦</div>
        <div class="ni-label">庫存</div>
      </a>
      <a href="javascript:void(0)" class="nav-item active">
        <div class="ni-icon">👗</div>
        <div class="ni-label">衣櫥</div>
      </a>
      <a href="javascript:void(0)" class="nav-item" onclick="navigateTo('module-wiki.html')">
        <div class="ni-icon">📖</div>
        <div class="ni-label">百科</div>
      </a>
    </div>
  </div>

  <script>
    let roomCode = new URLSearchParams(window.location.search).get('room') || 'MY0918';

    const clothes = [
      { id: 1, name: '藍色套裝', type: 'dress', size: '80cm', status: 'current', icon: '👗', worn: true },
      { id: 2, name: '米色紗裙洋裝', type: 'dress', size: '90cm', status: 'storage', icon: '👗', worn: false },
      { id: 3, name: '粉色包屁衣', type: 'top', size: '70cm', status: 'outgrown', icon: '👕', worn: true },
      { id: 4, name: '格紋薄外套', type: 'jacket', size: '2T', status: 'current', icon: '🧥', worn: true },
      { id: 5, name: '白色背心', type: 'top', size: '80cm', status: 'current', icon: '👕', worn: false },
      { id: 6, name: '紅色連身洋裝', type: 'dress', size: '100cm', status: 'storage', icon: '👗', worn: true },
      { id: 7, name: '牛仔褲', type: 'other', size: '3T', status: 'current', icon: '👖', worn: true },
      { id: 8, name: '彩虹條紋長袖', type: 'top', size: '90cm', status: 'outgrown', icon: '👕', worn: true }
    ];

    const typeMap = {
      dress: '👗 洋裝/連身',
      top: '👕 上衣',
      jacket: '🧥 外套',
      other: '其他'
    };

    const statusMap = {
      current: '當季',
      storage: '非當季',
      outgrown: '穿不下',
      sold: '已轉贈/售出'
    };

    const statusColors = {
      current: { class: 'st-cur', label: '當季' },
      storage: { class: 'st-off', label: '收納中' },
      outgrown: { class: 'st-small', label: '穿不下' },
      sold: { class: 'st-out', label: '已轉贈' }
    };

    function init() {
      updateTime();
      renderClothes();
      setInterval(updateTime, 1000);
    }

    function updateTime() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const mins = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('currentTime').textContent = `${hours}:${mins}`;
    }

    function renderClothes() {
      const grid = document.getElementById('clothGrid');
      grid.innerHTML = clothes.map(cloth => {
        const status = statusColors[cloth.status];
        return `
          <div class="cloth-card" onclick="selectCloth(${cloth.id})">
            <div class="cloth-img">${cloth.icon}</div>
            <div class="cloth-body">
              <div class="cloth-name">${cloth.name}</div>
              <div class="cloth-tags">
                <span class="ctag ctag-type">${typeMap[cloth.type] || cloth.type}</span>
                <span class="ctag ctag-size">${cloth.size}</span>
                <span class="ctag-status ${status.class}">${status.label}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function selectCloth(id) {
      const card = document.querySelector(`.cloth-card[data-id="${id}"]`);
      if (card) card.classList.toggle('selected');
    }

    function filterType(type) {
      document.querySelectorAll('.filter-pills')[0].querySelectorAll('.pill').forEach((p, i) => {
        p.classList.toggle('active', 
          (i === 0 && type === 'all') ||
          (i === 1 && type === 'dress') ||
          (i === 2 && type === 'jacket') ||
          (i === 3 && type === 'top') ||
          (i === 4 && type === 'other')
        );
      });
    }

    function filterStatus(status) {
      document.querySelectorAll('.filter-pills')[1].querySelectorAll('.pill').forEach((p, i) => {
        p.classList.toggle('active',
          (i === 0 && status === 'all') ||
          (i === 1 && status === 'current') ||
          (i === 2 && status === 'storage') ||
          (i === 3 && status === 'outgrown')
        );
      });
    }

    function addCloth() {
      alert('新增衣物 (示範版本)');
    }

    function openCSV() {
      alert('CSV 匯入/匯出 (示範版本)');
    }

    function goHome() {
      window.location.href = `index.html?room=${roomCode}`;
    }

    function navigateTo(page) {
      window.location.href = `${page}?room=${roomCode}`;
    }

    init();
  </script>
</body>
</html>
